<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Agent</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container" id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Conversations</h2>
                <button class="btn btn-primary btn-sm" id="new-chat-btn">+ New Chat</button>
            </div>
            <div class="conversation-list" id="conversation-list">
                <!-- Conversations will be populated here -->
            </div>
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-sm" id="theme-toggle">Toggle Theme</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <button class="sidebar-toggle" id="sidebar-toggle">
                    <span></span>
                </button>
                <h1 id="chat-title">AI Chat Agent</h1>
                <div class="header-tools">
                    <span class="status-indicator" id="status"></span>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-message" id="welcome">
                    <h2>Welcome to AI Chat Agent</h2>
                    <p>I'm an AI assistant with access to tools:</p>
                    <ul>
                        <li><strong>Web Search</strong> - Search the web for current information</li>
                        <li><strong>SQL Query</strong> - Query the sample e-commerce database</li>
                    </ul>
                    <p>Try asking me something!</p>
                </div>
            </div>

            <!-- Tool/Memory Panel -->
            <div class="info-panel collapsed" id="info-panel">
                <div class="info-panel-header">
                    <span id="info-panel-title">Details</span>
                    <button class="btn btn-sm" id="close-info-panel">&times;</button>
                </div>
                <div class="info-panel-content" id="info-panel-content"></div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-container">
                <form class="chat-input-form" id="chat-form">
                    <textarea
                        id="message-input"
                        placeholder="Type your message..."
                        rows="1"
                        autofocus
                    ></textarea>
                    <button type="submit" class="btn btn-primary" id="send-btn">
                        <span class="send-icon">Send</span>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
